<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 260px; padding: 14px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a1f; color: #f0f0f5; margin: 0; }
    h2 { margin: 0 0 10px 0; font-size: 15px; }
    .field { margin-bottom: 10px; }
    label { display: block; font-size: 11px; color: #9a9aa3; margin-bottom: 3px; }
    input { width: 100%; padding: 6px; background: #0f0f12; border: 1px solid #333; border-radius: 6px; color: #f0f0f5; font-size: 13px; }
    button { width: 100%; padding: 8px; background: #cc8b4a; border: none; border-radius: 6px; color: #fff; font-weight: 600; cursor: pointer; margin-top: 6px; }
    button:hover { background: #e09d5a; }
    .status { font-size: 12px; color: #9a9aa3; margin-top: 10px; text-align: center; }
    .status.ok { color: #4caf50; }
    .status.err { color: #f44336; }
  </style>
</head>
<body>
  <h2>RentMasseur Booker</h2>
  <div class="field">
    <label>Booking Server URL</label>
    <input type="text" id="serverUrl" value="http://localhost:3000" placeholder="http://localhost:3000">
  </div>
  <button id="saveBtn">Save Settings</button>
  <button id="openBookings" style="background:#2a2a30;margin-top:6px;">Open Booking Page</button>
  <div class="status" id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
