name: RentMasseur Metrics & Availability Keeper

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      manual_metrics:
        description: 'JSON metrics from manual dashboard read (paste JSON)'
        required: false
        default: ''

jobs:
  collect-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ingest manual metrics if provided
        if: ${{ github.event.inputs.manual_metrics != '' }}
        run: |
          mkdir -p content
          echo "{\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"source\":\"manual_upload\",\"body\":${{ github.event.inputs.manual_metrics }}}" >> content/metrics_ingest.jsonl
          echo "Manual metrics ingested."

      - name: Fetch metrics from HF Space ingest endpoint
        run: |
          mkdir -p content
          curl -s "https://josephrw-rentmasseur-optimizer.hf.space/api/report" -o content/hf_report.json || true
          echo "HF Space report fetched."

      - name: Process metrics and update state
        run: |
          python3 metrics_collector.py --process

      - name: Write proof file
        run: |
          python3 metrics_collector.py --proof

      - name: Commit and push state + proof
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/ || true
          git add availability.json || true
          git add receipts/ || true
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Metrics collection + proof: first-party data $(date -u +%Y-%m-%d-%H:%M)"
            git push
          else
            echo "No changes to commit"
          fi

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: metrics-debug
          path: |
            content/
            receipts/
          retention-days: 7
