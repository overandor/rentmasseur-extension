name: RentMasseur Metrics & Availability Keeper

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      manual_metrics:
        description: 'JSON metrics from manual dashboard read (paste JSON)'
        required: false
        default: ''

jobs:
  collect-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RENTMASSEUR_USERNAME: ${{ secrets.RENTMASSEUR_USERNAME }}
      RENTMASSEUR_PASSWORD: ${{ secrets.RENTMASSEUR_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Chrome and ChromeDriver
        run: |
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          CHROME_VERSION=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+' | head -1)
          DRIVER_VERSION=$(curl -s "https://googlechromelabs.github.io/chrome-for-testing/LATEST_RELEASE_${CHROME_VERSION%%.*}")
          wget -q "https://storage.googleapis.com/chrome-for-testing-public/${DRIVER_VERSION}/linux64/chromedriver-linux64.zip"
          unzip -q chromedriver-linux64.zip
          sudo mv chromedriver-linux64/chromedriver /usr/local/bin/chromedriver
          sudo chmod +x /usr/local/bin/chromedriver
          echo "Chrome: $(google-chrome --version)"
          echo "ChromeDriver: $(chromedriver --version)"

      - name: Keep availability 24/7
        continue-on-error: true
        timeout-minutes: 5
        run: |
          timeout 240 python3 rentmasseur_availability.py --headless true || echo "Availability keeper failed - will retry next run"

      - name: Visit back recent clients via direct API
        continue-on-error: true
        timeout-minutes: 5
        run: |
          pip install requests
          python3 -c "
          import sys; sys.path.insert(0, '.')
          from rm_traffic.api_client import RentMasseurAPI
          import requests, time
          from concurrent.futures import ThreadPoolExecutor
          api = RentMasseurAPI(min_request_interval=0.3)
          api.login('${RENTMASSEUR_USERNAME}', '${RENTMASSEUR_PASSWORD}')
          api.set_track_actions(True)
          usernames = set()
          for page in range(1, 4):
              mail = api.get_mailbox(page=page, folder=1)
              for e in mail.get('emails', []):
                  u = e.get('userCard', {}).get('username', '')
                  if u: usernames.add(u)
          usernames = sorted(usernames)[:30]
          token = api.session.headers.get('Authorization', '')
          cookies = {c.name: c.value for c in api.session.cookies}
          def visit(u):
              try:
                  r = requests.get(f'https://rentmasseur.com/{u}', headers={'User-Agent': 'Mozilla/5.0', 'Authorization': token}, cookies=cookies, timeout=15)
                  return r.status_code
              except: return 'error'
          with ThreadPoolExecutor(max_workers=33) as pool:
              results = list(pool.map(visit, usernames))
          ok = sum(1 for r in results if r == 200)
          print(f'Visit-back: {ok}/{len(usernames)} OK')
          " || echo "Visit-back failed - will retry next run"

      - name: Ingest manual metrics if provided
        if: ${{ github.event.inputs.manual_metrics != '' }}
        run: |
          mkdir -p content
          echo "{\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"source\":\"manual_upload\",\"body\":${{ github.event.inputs.manual_metrics }}}" >> content/metrics_ingest.jsonl
          echo "Manual metrics ingested."

      - name: Fetch metrics from HF Space
        run: |
          mkdir -p content
          curl -s "https://josephrw-rentmasseur-optimizer.hf.space/api/report" -o content/hf_report.json || true
          echo "HF Space report fetched."

      - name: Process metrics and update state
        run: |
          python3 metrics_collector.py --process

      - name: Write proof file
        run: |
          python3 metrics_collector.py --proof

      - name: Commit and push state + proof
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/ || true
          git add availability.json || true
          git add receipts/ || true
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Metrics + availability keeper: $(date -u +%Y-%m-%d-%H:%M)"
            git push
          else
            echo "No changes to commit"
          fi

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: metrics-debug
          path: |
            content/
            receipts/
          retention-days: 7
