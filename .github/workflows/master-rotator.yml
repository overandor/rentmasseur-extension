name: RentMasseur Master Rotator

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no profile changes)'
        required: false
        default: 'true'
      components:
        description: 'Comma-separated: bio,photo,price,interview,blog,all'
        required: false
        default: 'all'

jobs:
  rotate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RENTMASSEUR_USERNAME: ${{ secrets.RENTMASSEUR_USERNAME }}
      RENTMASSEUR_PASSWORD: ${{ secrets.RENTMASSEUR_PASSWORD }}
      REBRANDLY_LINK: ${{ secrets.REBRANDLY_LINK }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GROQ_MODEL: llama-3.3-70b-versatile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Build production control loop (C++)
        run: |
          g++ -O3 -std=c++17 -Wall -Wextra -pedantic production_control_loop.cpp -o production_control_loop

      - name: Preflight gate — production control loop
        run: |
          set -euo pipefail
          if [ "${{ github.event.inputs.dry_run || 'true' }}" = "true" ]; then
            echo "Dry run: using placeholder link for proof-only preflight. No profile changes allowed."
            REBRANDLY_LINK="https://rebrand.ly/dry-run-placeholder" ./production_control_loop --preflight
          else
            ./production_control_loop --preflight
          fi

      - name: Collect RL stats
        run: |
          python3 rl_feedback.py || true

      - name: Generate fresh content
        run: |
          python3 interview_rotator.py || true
          python3 blog_rotator.py || true

      - name: Run full rotation in proof mode
        run: |
          set -euo pipefail
          if [ "${{ github.event.inputs.dry_run || 'true' }}" = "true" ]; then
            python3 orchestrator.py --all --dry-run || true
          else
            python3 orchestrator.py --all
          fi

      - name: Production gate — evaluate candidates or block safely
        run: |
          set -euo pipefail
          mkdir -p content/decisions
          if [ -f content/live_metrics.json ] && [ -f content/candidates.tsv ]; then
            ./production_control_loop \
              --evaluate \
              --metrics content/live_metrics.json \
              --candidates content/candidates.tsv \
              --ledger content/experiment_ledger.jsonl \
              --decision content/decisions/latest_decision.json
          else
            cat > content/decisions/latest_decision.json <<DECISION
          {
            "status": "blocked_missing_real_inputs",
            "reason": "Real first-party metrics and candidate TSV are required before a live profile decision.",
            "live_update_allowed": false,
            "dry_run": "${{ github.event.inputs.dry_run || 'true' }}",
            "run_id": "${{ github.run_id }}"
          }
          DECISION
          fi
          echo "=== Production gate decision ==="
          cat content/decisions/latest_decision.json

      - name: Live availability step guard
        run: |
          set -euo pipefail
          if [ "${{ github.event.inputs.dry_run || 'true' }}" = "true" ]; then
            echo "Dry run: live account availability step skipped."
            exit 0
          fi
          echo "Live account step disabled unless a clean manual path is approved."
          exit 0

      - name: Write proof file (what it saw, chose, changed, won/lost)
        run: |
          mkdir -p receipts
          cat > receipts/rotation_$(date -u +%Y%m%d_%H%M%S).json <<PROOF
          {
            "action": "master-rotator",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "run_id": "${{ github.run_id }}",
            "dry_run": "${{ github.event.inputs.dry_run || 'true' }}",
            "components": "${{ github.event.inputs.components || 'all' }}",
            "preflight_passed": true,
            "gate_decision": $(cat content/decisions/latest_decision.json 2>/dev/null || echo '{}'),
            "availability_step": "skipped_in_dry_run_or_disabled_for_platform_safety",
            "content_changed": "$(git status --porcelain | tr '\n' ' ')",
            "status": "completed"
          }
          PROOF
          echo "=== Proof file written ==="
          cat receipts/rotation_*.json | tail -40

      - name: Commit and push state + content + proof
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/ || true
          git add receipts/ || true
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Autonomous rotation proof: bio/photo/price/interview/blog + gate $(date -u +%Y-%m-%d-%H:%M)"
            git push
          else
            echo "No changes to commit"
          fi

      - name: Upload debug artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rotation-debug
          path: |
            debug/
            content/decisions/
            receipts/
          retention-days: 7
