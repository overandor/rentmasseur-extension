name: Daily Content Generator

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  generate-content:
    runs-on: ubuntu-latest
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GROQ_MODEL: llama-3.3-70b-versatile
      RENTMASSEUR_USERNAME: ${{ secrets.RENTMASSEUR_USERNAME }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate daily content (bios, blog posts, interview questions + mass analysis)
        run: |
          python3 content_generator.py

      - name: Generate social media posts
        run: |
          python3 social_media_generator.py

      - name: Generate email templates
        run: |
          python3 email_templates.py

      - name: Generate SEO keywords
        run: |
          python3 seo_keywords.py

      - name: Commit and push generated content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/
          if git diff --cached --quiet; then
            echo "No new content to commit"
          else
            git commit -m "Daily content: bios, blogs, questions, social, emails, SEO + mass analysis $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Upload content artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-content
          path: content/
          retention-days: 30
