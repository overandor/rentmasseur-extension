name: Deploy to Hugging Face Space

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */12 * * *'  # Redeploy every 12 hours with new data
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure HF credentials
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Clone existing HF space
        run: |
          rm -rf hf-space
          git clone https://hf_user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_NAME} hf-space || true

      - name: Sync files to HF space
        run: |
          rm -rf hf-space/*
          rsync -av --exclude='hf-space' --exclude='.git' --exclude='.env' --exclude='debug' . hf-space/
          rm -rf hf-space/.git
          rm -rf hf-space/.env
          rm -rf hf-space/debug
          # Keep latest generated data and state
          echo "RENTMASSEUR_USERNAME=${{ secrets.RENTMASSEUR_USERNAME }}" > hf-space/.env
          echo "RENTMASSEUR_PASSWORD=${{ secrets.RENTMASSEUR_PASSWORD }}" >> hf-space/.env
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> hf-space/.env
          echo "GROQ_MODEL=llama-3.3-70b-versatile" >> hf-space/.env
          echo "HF_SPACE_NAME=${HF_SPACE_NAME}" >> hf-space/.env

      - name: Push to HF space
        run: |
          cd hf-space
          git init
          git add -A
          git commit -m "Auto-deploy from GitHub Actions with latest data $(date -u +%Y-%m-%d-%H:%M:%S)"
          git push https://hf_user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_NAME} main --force

      - name: Trigger HF space build and verify
        run: |
          sleep 15
          echo "Checking HF Space runtime..."
          curl -s https://huggingface.co/api/spaces/${HF_SPACE_NAME}/runtime || true
          curl -s https://huggingface.co/spaces/${HF_SPACE_NAME}/api/health || true
