name: RM Telemetry Daemon (1-min API polling)

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  telemetry:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RM_USER: ${{ secrets.RENTMASSEUR_USERNAME }}
      RM_PASS: ${{ secrets.RENTMASSEUR_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Run ProfileOps daemon (10 min, 1-min stats interval)
        run: |
          timeout 600 python3 -m rm_traffic.profileops --daemon --city manhattan-ny || true

      - name: Export telemetry snapshot
        run: |
          mkdir -p content
          python3 -c "
          import sqlite3, json, os
          db_path = 'rm_traffic/profileops.db'
          if not os.path.exists(db_path):
              print('{}')
              exit()
          conn = sqlite3.connect(db_path)
          conn.row_factory = sqlite3.Row
          rows = conn.execute('SELECT * FROM stats ORDER BY ts DESC LIMIT 1').fetchall()
          if rows:
              latest = {k: rows[0][k] for k in rows[0].keys()}
              with open('content/telemetry_latest.json', 'w') as f:
                  json.dump(latest, f, indent=2)
              print(json.dumps(latest, indent=2))
          conn.close()
          " || true

      - name: Commit telemetry data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/telemetry_latest.json rm_traffic/profileops.db rm_traffic/profileops.log 2>/dev/null || true
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Telemetry: 1-min API poll $(date -u +%Y-%m-%d-%H:%M) UTC"
            git push
          else
            echo "No telemetry changes to commit"
          fi

      - name: Upload telemetry artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: telemetry-$(date -u +%Y%m%d-%H%M)
          path: |
            content/telemetry_latest.json
            rm_traffic/profileops.db
            rm_traffic/profileops.log
          retention-days: 7
