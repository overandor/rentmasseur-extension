name: Hourly KPI Collector

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  collect-kpis:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      HF_URL: ${{ secrets.HF_URL }}
      ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Compute hourly KPIs
        run: |
          python3 kpis.py

      - name: Commit and push KPIs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/kpis/ || true
          git add receipts/ || true
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Hourly KPIs: $(date -u +%Y-%m-%d-%H:%M)"
            git push
          else
            echo "No KPI changes to commit"
          fi

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kpi-debug
          path: |
            content/kpis/
            receipts/
          retention-days: 7
