name: AI RAM Guardian Pages

on:
  workflow_dispatch:
  push:
    branches:
      - ai-ram-guardian-launch-kit
    paths:
      - 'ai-ram-guardian/landing/**'
      - '.github/workflows/ai-ram-guardian-pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ai-ram-guardian-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: ai-ram-guardian/landing

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
