name: Auto Bio Updater

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-bio:
    runs-on: ubuntu-latest
    env:
      RENTMASSEUR_USERNAME: ${{ secrets.RENTMASSEUR_USERNAME }}
      RENTMASSEUR_PASSWORD: ${{ secrets.RENTMASSEUR_PASSWORD }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GROQ_MODEL: llama-3.3-70b-versatile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Push approved bio via direct API
        run: |
          python3 push_bio.py --bio-id controlled_wolf_v1 --no-rebrandly
        env:
          RENTMASSEUR_USERNAME: ${{ secrets.RENTMASSEUR_USERNAME }}
          RENTMASSEUR_PASSWORD: ${{ secrets.RENTMASSEUR_PASSWORD }}

      - name: Write receipt
        run: |
          mkdir -p receipts
          cat > receipts/bio_update_$(date -u +%Y%m%d_%H%M%S).json <<EOF
          {
            "action": "auto-bio-update",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "bio_id": "controlled_wolf_v1",
            "method": "direct_api",
            "selenium": false,
            "status": "completed"
          }
          EOF

      - name: Commit receipt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add receipts/ || true
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Bio update receipt $(date -u +%Y-%m-%d-%H:%M)"
            git push
          fi

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bio-update-debug
          path: debug/
          retention-days: 7
